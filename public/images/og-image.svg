<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2520"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#b8845e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative arcs -->
  <circle cx="600" cy="260" r="80" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="600" cy="260" r="120" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.15"/>
  <circle cx="600" cy="260" r="160" stroke="url(#gold)" stroke-width="0.5" fill="none" opacity="0.08"/>
  <!-- Logo text -->
  <text x="600" y="280" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="64" font-weight="500" fill="#f0ede6" letter-spacing="8">OTONAMI</text>
  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="'DM Sans', -apple-system, sans-serif" font-size="20" fill="#c0bdb5" letter-spacing="1">Connect Japanese Music to the World</text>
  <!-- Accent line -->
  <rect x="550" y="360" width="100" height="2" rx="1" fill="url(#gold)" opacity="0.6"/>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="'DM Sans', -apple-system, sans-serif" font-size="16" fill="#7a7870">otonami.io</text>
</svg>
